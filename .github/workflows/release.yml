name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # The release ships only if the full test suite passes first.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            setup: sudo apt-get update && sudo apt-get install -y musl-tools
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Sign and notarize (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          binary="target/${{ matrix.target }}/release/vqa40x"
          keychain_pwd=$(openssl rand -hex 16)
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$keychain_pwd" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$keychain_pwd" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$keychain_pwd" build.keychain
          rm certificate.p12
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" "$binary"
          codesign --verify --strict --verbose=2 "$binary"
          ditto -c -k "$binary" notarize.zip
          id=$(xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --output-format json | jq -r .id)
          rm notarize.zip
          echo "notarization submission: $id"
          # Poll ourselves instead of `submit --wait`: the poll survives
          # transient network errors and prints progress. 2h hard timeout.
          status="In Progress"
          for i in $(seq 1 120); do
            sleep 60
            info=$(xcrun notarytool info "$id" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --output-format json) || { echo "[$i] info failed, retrying"; continue; }
            status=$(echo "$info" | jq -r .status)
            echo "[$i] status: $status"
            [ "$status" = "In Progress" ] || break
          done
          if [ "$status" != "Accepted" ]; then
            xcrun notarytool log "$id" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          name="vqa40x-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/vqa40x" README.md LICENSE "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          rm -r "dist/$name"
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "vqa40x-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/vqa40x.exe", "README.md", "LICENSE" "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          Remove-Item -Recurse "dist/$name"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "vqa40x $GITHUB_REF_NAME" \
            --generate-notes
